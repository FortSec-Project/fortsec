<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ebooks — FORTSEC OFFENSIVE SECURITY</title>
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <link rel="icon" href="profile.webp" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Exo+2:ital,wght@0,200;0,400;0,700;1,200&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-black: #0a0a0a;
            --carbon-dark:   #121212;
            --carbon-medium: #1a1a1a;
            --accent-green:  #00ff88;
            --accent-cyan:   #00ffff;
            --accent-purple: #9945ff;
            --accent-red:    #ff3333;
            --text-primary:  #ffffff;
            --text-secondary:#b0b0b0;
            --text-dim:      #606060;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Orbitron', sans-serif;
            background: var(--primary-black);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background:
                repeating-linear-gradient(0deg,   transparent, transparent 2px, rgba(255,255,255,0.015) 2px, rgba(255,255,255,0.015) 4px),
                repeating-linear-gradient(90deg,  transparent, transparent 2px, rgba(255,255,255,0.015) 2px, rgba(255,255,255,0.015) 4px);
            z-index: -1; pointer-events: none;
        }

        /* ── HEADER ── */
        .header {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            background: rgba(10,10,10,0.96); backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(153,69,255,0.2);
        }

        .nav-container {
            max-width: 1400px; margin: 0 auto; padding: 18px 40px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .logo { display: flex; align-items: center; gap: 14px; text-decoration: none; color: #fff; }
        .logo-icon img { width: 46px; height: 46px; border-radius: 50%; border: 2px solid var(--accent-purple); }
        .logo-text { display: flex; flex-direction: column; }
        .fortsec  { font-size: 22px; font-weight: 900; letter-spacing: 2px; }
        .security { font-size: 11px; letter-spacing: 3px; color: var(--accent-cyan); }

        .back-link {
            font-family: 'Exo 2', sans-serif; font-size: 13px; letter-spacing: 1px;
            color: var(--text-secondary); text-decoration: none; transition: color .2s;
        }
        .back-link:hover { color: var(--accent-cyan); }

        /* ── HERO ── */
        .hero {
            padding: 120px 40px 60px;
            text-align: center;
            position: relative;
        }

        .hero::before {
            content: '';
            position: absolute; top: 80px; left: 50%; transform: translateX(-50%);
            width: 600px; height: 300px;
            background: radial-gradient(ellipse, rgba(153,69,255,0.12) 0%, transparent 70%);
            pointer-events: none;
        }

        .hero-badge {
            display: inline-block;
            background: rgba(153,69,255,0.1); border: 1px solid rgba(153,69,255,0.4);
            border-radius: 20px; padding: 6px 18px;
            font-size: 10px; letter-spacing: 4px; color: var(--accent-purple);
            margin-bottom: 20px;
        }

        .hero-title {
            font-size: clamp(36px, 6vw, 72px); font-weight: 900; letter-spacing: 4px;
            background: linear-gradient(135deg, #fff 0%, var(--accent-cyan) 50%, var(--accent-purple) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            margin-bottom: 16px; line-height: 1.1;
        }

        .hero-sub {
            font-family: 'Exo 2', sans-serif; font-size: 15px; letter-spacing: 2px;
            color: var(--text-secondary); max-width: 600px; margin: 0 auto 12px;
        }

        .hero-count {
            font-family: 'Exo 2', sans-serif; font-size: 13px;
            color: var(--accent-green); letter-spacing: 2px;
        }

        /* ── BUSCA ── */
        .search-wrap {
            max-width: 500px; margin: 32px auto 0;
            position: relative;
        }

        .search-input {
            width: 100%; padding: 14px 48px 14px 20px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 30px;
            color: var(--text-primary); font-family: 'Exo 2', sans-serif; font-size: 14px;
            outline: none; transition: border-color .25s, box-shadow .25s;
        }
        .search-input::placeholder { color: rgba(255,255,255,0.25); }
        .search-input:focus { border-color: var(--accent-cyan); box-shadow: 0 0 0 3px rgba(0,255,255,0.08); }

        .search-icon {
            position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
            color: var(--text-dim); font-size: 16px; pointer-events: none;
        }

        /* ── GRID ── */
        .grid-section {
            max-width: 1400px; margin: 0 auto; padding: 40px 40px 80px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 24px;
        }

        /* ── CARD ── */
        .ebook-card {
            background: var(--carbon-dark);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 16px; overflow: hidden;
            transition: transform .3s, border-color .3s, box-shadow .3s;
            display: flex; flex-direction: column;
            animation: fadeUp .5s ease both;
        }

        .ebook-card:hover {
            transform: translateY(-6px);
            border-color: rgba(153,69,255,0.4);
            box-shadow: 0 16px 40px rgba(153,69,255,0.15);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Capa */
        .card-cover {
            width: 100%; aspect-ratio: 3/4;
            background: linear-gradient(145deg, var(--carbon-medium), #0d0d0d);
            position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        .card-cover img {
            width: 100%; height: 100%; object-fit: cover;
            display: none; /* esconde até ter imagem real */
        }

        /* Placeholder da capa */
        .cover-placeholder {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 12px; padding: 20px; text-align: center; width: 100%;
        }

        .cover-icon { font-size: 40px; opacity: .6; }

        .cover-title-mini {
            font-size: 11px; letter-spacing: 1px; color: var(--text-dim);
            line-height: 1.5; font-family: 'Exo 2', sans-serif;
        }

        /* Faixa decorativa no topo da capa */
        .card-cover::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, var(--accent-purple), var(--accent-cyan));
        }

        /* Corpo */
        .card-body {
            padding: 16px 18px 18px;
            flex: 1; display: flex; flex-direction: column; gap: 12px;
        }

        .card-title {
            font-family: 'Exo 2', sans-serif; font-size: 13px; font-weight: 700;
            color: var(--text-primary); line-height: 1.5;
            display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
        }

        .card-tag {
            display: inline-block;
            font-size: 9px; letter-spacing: 2px;
            background: rgba(153,69,255,0.1); border: 1px solid rgba(153,69,255,0.25);
            border-radius: 20px; padding: 3px 10px; color: var(--accent-purple);
        }

        .btn-download {
            display: block; width: 100%; padding: 11px;
            background: linear-gradient(135deg, var(--accent-purple) 0%, var(--accent-cyan) 100%);
            border: none; border-radius: 8px;
            color: #000; font-family: 'Orbitron', sans-serif; font-weight: 700;
            font-size: 10px; letter-spacing: 2px; text-align: center; text-decoration: none;
            cursor: pointer; transition: opacity .2s, transform .2s;
            margin-top: auto;
        }
        .btn-download:hover { opacity: .85; transform: translateY(-1px); }

        /* Sem resultados */
        .no-results {
            text-align: center; padding: 80px 20px; display: none;
            font-family: 'Exo 2', sans-serif; font-size: 16px; color: var(--text-dim);
        }

        /* ── FOOTER ── */
        .footer {
            text-align: center; padding: 24px;
            font-family: 'Exo 2', sans-serif; font-size: 11px; letter-spacing: 2px;
            color: var(--text-dim); border-top: 1px solid rgba(255,255,255,0.05);
        }

        @media (max-width: 768px) {
            .nav-container { padding: 15px 20px; }
            .hero { padding: 100px 20px 40px; }
            .grid-section { padding: 20px 20px 60px; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; }
        }

        @media (max-width: 480px) {
            .grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
        }
    </style>
</head>
<body>

<header class="header">
    <nav class="nav-container">
        <a href="index.html" class="logo">
            <div class="logo-icon">
                <img src="profile.webp" alt="FortSec">
            </div>
            <span class="logo-text">
                <span class="fortsec">FORTSEC</span>
                <span class="security">SECURITY</span>
            </span>
        </a>
        <a href="index.html" class="back-link">← VOLTAR</a>
    </nav>
</header>

<section class="hero">
    <div class="hero-badge">BIBLIOTECA DIGITAL</div>
    <h1 class="hero-title">EBOOKS</h1>
    <p class="hero-sub">CONHECIMENTO OFENSIVO. ACESSO GRATUITO.</p>
    <p class="hero-count" id="heroCount">26 TÍTULOS DISPONÍVEIS</p>

    <div class="search-wrap">
        <input type="text" class="search-input" id="searchInput"
               placeholder="Buscar ebook..." oninput="filtrar()">
        <span class="search-icon">⌕</span>
    </div>
</section>

<section class="grid-section">
    <div class="grid" id="ebooksGrid"></div>
    <div class="no-results" id="noResults">Nenhum ebook encontrado para "<span id="searchTerm"></span>"</div>
</section>

<footer class="footer">
    FORTSEC OFFENSIVE SECURITY — TODOS OS DIREITOS RESERVADOS
</footer>

<script>
(function () {
    'use strict';

    const BASE = 'https://dv5hwsmbrlvue79r.public.blob.vercel-storage.com';

    const ebooks = [
        { title: 'Análise de Malware Software Livre',          file: 'Análise de malware Software Livre.pdf' },
        { title: 'OWASP TOP 10 2017 (Português)',              file: 'OWASP TOP 10 2017 Português.pdf' },
        { title: 'Fundamentos do Ethical Hacking',             file: 'Fundamentos do Ethical Hacking.pdf' },
        { title: 'Gerência de Redes de Computadores',          file: 'Gerência de Redes de Computadores.pdf' },
        { title: 'Segurança em Redes sem Fio',                 file: 'Segurança em Redes sem Fio.pdf' },
        { title: 'Python e Django',                            file: 'Python e Django.pdf' },
        { title: 'Shell Script Profissional',                  file: 'Shell Script Profissional.pdf' },
        { title: 'Black Hat Python — Programação para Hackers',file: 'Black Hat Python Programação para Hackers.pdf' },
        { title: 'Wireless Hacking',                           file: 'Wireless Hacking.pdf' },
        { title: 'Pentest em Redes sem Fio',                   file: 'Pentest em redes sem fio.pdf' },
        { title: 'Teste de Invasão de Aplicações Web',         file: 'Teste de invasão de aplicações web.pdf' },
        { title: 'The Hacker Playbook',                        file: 'The Hacker Playbook.pdf' },
        { title: 'Hacking Resources',                          file: 'Hacking-Resources.pdf' },
        { title: 'Checklist de Segurança',                     file: 'checklist de segurança.pdf' },
        { title: 'Guia de Contratação',                        file: 'guia de contratação.pdf' },
        { title: 'Engenharia Reversa e Malware',               file: 'engenharia reversa e malware.pdf' },
        { title: 'Advanced Penetration Test',                  file: 'advanced penetration test.pdf' },
        { title: 'OSCP Offensive Security',                    file: 'OSCP ooffensive security.pdf' },
        { title: 'Hacking Para Leigos',                        file: 'Hacking Para Leigos.pdf' },
        { title: 'Engenharia Social',                          file: 'Engenharia Social.pdf' },
        { title: 'Engenharia Reversa de Código Malicioso',     file: 'Engenharia reversa de código malicioso.pdf' },
        { title: 'Engenharia de Software',                     file: 'Engenharia De Software .pdf' },
        { title: 'Começando com o Linux',                      file: 'Comecando Com o Linux .pdf' },
        { title: 'Arquitetura e Protocolo de Rede TCP/IP',     file: 'Arquitetura e protocolo de rede TCP-IP.pdf' },
        { title: 'A Arte de Invadir',                          file: 'A Arte de Invadir.pdf' },
        { title: '10 Ferramentas de Varredura de Portas',      file: '10 Ferramentas de Varredura de Portas.pdf' },
        { title: 'Linux — A Bíblia',                           file: 'Linux A Bíblia.pdf' },
    ];

    // ── Render ────────────────────────────────────────────
    function render(lista) {
        const grid    = document.getElementById('ebooksGrid');
        const noRes   = document.getElementById('noResults');
        const count   = document.getElementById('heroCount');

        grid.innerHTML = '';

        if (!lista.length) {
            noRes.style.display = 'block';
            count.textContent   = '0 TÍTULOS ENCONTRADOS';
            return;
        }

        noRes.style.display = 'none';
        count.textContent   = `${lista.length} TÍTULO${lista.length === 1 ? '' : 'S'} DISPONÍVE${lista.length === 1 ? 'L' : 'IS'}`;

        lista.forEach((eb, i) => {
            const url  = `${BASE}/${encodeURIComponent(eb.file)}?download=1`;

            // Nome do arquivo de capa esperado (você coloca na pasta covers/)
            // Ex: covers/analise-malware.webp
            // Se não existir, mostra o placeholder automaticamente
            const coverName = 'covers/' + eb.file
                .replace('.pdf', '')
                .toLowerCase()
                .replace(/\s+/g, '-')
                .replace(/[^a-z0-9\-]/g, '')
                + '.webp';

            const card = document.createElement('div');
            card.className = 'ebook-card';
            card.style.animationDelay = `${i * 0.04}s`;

            card.innerHTML = `
                <div class="card-cover">
                    <img src="${coverName}" alt="${esc(eb.title)}"
                         onload="this.style.display='block';this.nextElementSibling.style.display='none'"
                         onerror="this.style.display='none'">
                    <div class="cover-placeholder">
                        <span class="cover-icon">📖</span>
                        <span class="cover-title-mini">${esc(eb.title)}</span>
                    </div>
                </div>
                <div class="card-body">
                    <div class="card-tag">GRATUITO</div>
                    <div class="card-title">${esc(eb.title)}</div>
                    <a href="${url}" class="btn-download" download>⬇ BAIXAR PDF</a>
                </div>
            `;

            grid.appendChild(card);
        });
    }

    // ── Filtro de busca ───────────────────────────────────
    window.filtrar = function () {
        const q = document.getElementById('searchInput').value.toLowerCase().trim();
        document.getElementById('searchTerm').textContent = q;
        render(q ? ebooks.filter(e => e.title.toLowerCase().includes(q)) : ebooks);
    };

    // ── Escape HTML ───────────────────────────────────────
    function esc(s) {
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // Init
    render(ebooks);
})();
</script>
</body>
</html>

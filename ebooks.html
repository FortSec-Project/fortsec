    // ── Render ────────────────────────────────────────────
    function render(lista) {
        const grid    = document.getElementById('ebooksGrid');
        const noRes   = document.getElementById('noResults');
        const count   = document.getElementById('heroCount');

        grid.innerHTML = '';

        if (!lista.length) {
            noRes.style.display = 'block';
            count.textContent   = '0 TÍTULOS ENCONTRADOS';
            return;
        }

        noRes.style.display = 'none';
        count.textContent   = `${lista.length} TÍTULO${lista.length === 1 ? '' : 'S'} DISPONÍVE${lista.length === 1 ? 'L' : 'IS'}`;

        lista.forEach((eb, i) => {
            const url  = eb.url ? eb.url : `${BASE}/${encodeURIComponent(eb.file)}?download=1`;

            const coverName = eb.cover ? 'covers/' + eb.cover : 'covers/' + eb.file.replace('.pdf', '').toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9\-]/g, '') + '.webp';

            const card = document.createElement('div');
            card.className = 'ebook-card';
            card.style.animationDelay = `${i * 0.04}s`;

            card.innerHTML = `
                <div class="card-cover">
                    <img src="${coverName}" alt="${esc(eb.title)}"
                         onload="this.style.display='block';this.nextElementSibling.style.display='none'"
                         onerror="this.style.display='none'">
                    <div class="cover-placeholder">
                        <span class="cover-icon">📖</span>
                        <span class="cover-title-mini">${esc(eb.title)}</span>
                    </div>
                </div>
                <div class="card-body">
                    <div class="card-tag">GRATUITO</div>
                    <div class="card-title">${esc(eb.title)}</div>
                    <a href="${url}" class="btn-download" download>⬇ BAIXAR PDF</a>
                </div>
            `;

            grid.appendChild(card);
        });
    }

    // ── Filtro de busca ───────────────────────────────────
    window.filtrar = function () {
        const q = document.getElementById('searchInput').value.toLowerCase().trim();
        document.getElementById('searchTerm').textContent = q;
        render(q ? ebooks.filter(e => e.title.toLowerCase().includes(q)) : ebooks);
    };

    // ── Escape HTML ───────────────────────────────────────
    function esc(s) {
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // Init
    render(ebooks);
})();

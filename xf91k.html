<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — FORTSEC</title>
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <link rel="icon" href="profile.webp" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Ubuntu+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:     #0a0a0a;
            --dark:   #121212;
            --medium: #1a1a1a;
            --border: rgba(255,255,255,0.07);
            --green:  #00ff88;
            --cyan:   #00ffff;
            --purple: #9945ff;
            --red:    #ff3333;
            --orange: #ff8800;
            --text:   #ffffff;
            --muted:  #b0b0b0;
            --dim:    #606060;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:'Orbitron',sans-serif;
            background:var(--bg); color:var(--text);
            min-height:100vh;
        }

        /* ── LOGIN ── */
        #loginScreen {
            display:flex; align-items:center; justify-content:center;
            min-height:100vh;
            background:radial-gradient(ellipse at center, rgba(153,69,255,0.08) 0%, transparent 60%);
        }

        .login-box {
            background:var(--dark);
            border:1px solid rgba(153,69,255,0.3);
            border-radius:20px;
            padding:48px 56px;
            width:100%; max-width:380px;
            text-align:center;
        }

        .login-logo { font-size:28px; font-weight:900; letter-spacing:3px; color:var(--cyan); margin-bottom:6px; }
        .login-sub  { font-family:'Ubuntu Mono',monospace; font-size:11px; letter-spacing:3px; color:var(--dim); margin-bottom:36px; }

        .login-label { display:block; font-family:'Ubuntu Mono',monospace; font-size:10px; letter-spacing:2px; color:var(--purple); text-align:left; margin-bottom:6px; }

        .login-input {
            width:100%; padding:12px 16px; margin-bottom:20px;
            background:rgba(255,255,255,0.04);
            border:1px solid rgba(255,255,255,0.1); border-radius:10px;
            color:var(--text); font-family:'Ubuntu Mono',monospace; font-size:15px;
            outline:none; letter-spacing:3px;
            transition:border-color .2s;
        }
        .login-input:focus { border-color:var(--purple); }

        .login-btn {
            width:100%; padding:14px;
            background:linear-gradient(135deg,var(--purple),var(--cyan));
            border:none; border-radius:10px;
            color:#000; font-family:'Orbitron',sans-serif; font-weight:700; font-size:13px; letter-spacing:2px;
            cursor:pointer; transition:opacity .2s, transform .2s;
        }
        .login-btn:hover { transform:translateY(-2px); opacity:.9; }

        .login-err {
            font-family:'Ubuntu Mono',monospace; font-size:11px;
            color:var(--red); margin-top:14px; display:none;
        }
        .login-err.show { display:block; }

        /* ── PAINEL ── */
        #dashboard { display:none; }

        .topbar {
            background:rgba(18,18,18,0.98);
            backdrop-filter:blur(12px);
            border-bottom:1px solid rgba(153,69,255,0.2);
            padding:16px 32px;
            display:flex; align-items:center; justify-content:space-between;
            position:sticky; top:0; z-index:100;
        }

        .topbar-title { font-size:16px; font-weight:900; letter-spacing:3px; color:var(--cyan); }
        .topbar-sub   { font-family:'Ubuntu Mono',monospace; font-size:10px; letter-spacing:2px; color:var(--dim); margin-top:2px; }

        .logout-btn {
            font-family:'Ubuntu Mono',monospace; font-size:11px; letter-spacing:1px;
            color:var(--red); background:none; border:1px solid rgba(255,51,51,0.3);
            border-radius:6px; padding:6px 14px; cursor:pointer; transition:all .2s;
        }
        .logout-btn:hover { background:rgba(255,51,51,0.08); }

        .main { max-width:1200px; margin:0 auto; padding:32px; display:flex; flex-direction:column; gap:28px; }

        /* Cards */
        .card {
            background:var(--dark);
            border-radius:16px;
            border:1px solid var(--border);
            overflow:hidden;
        }

        .card-header {
            padding:20px 28px;
            border-bottom:1px solid var(--border);
            display:flex; align-items:center; justify-content:space-between;
        }

        .card-title { font-size:13px; font-weight:700; letter-spacing:2px; }
        .card-title.green  { color:var(--green);  }
        .card-title.cyan   { color:var(--cyan);   }
        .card-title.purple { color:var(--purple); }
        .card-title.orange { color:var(--orange); }

        .card-body { padding:24px 28px; }

        /* Estoque */
        .stock-display {
            display:flex; align-items:center; gap:32px; flex-wrap:wrap;
        }

        .stock-number {
            font-size:72px; font-weight:900; font-family:'Ubuntu Mono',monospace;
            line-height:1;
        }
        .stock-number.ok  { color:var(--green); }
        .stock-number.low { color:var(--orange); }
        .stock-number.out { color:var(--red); }

        .stock-label { font-family:'Ubuntu Mono',monospace; font-size:11px; letter-spacing:2px; color:var(--dim); margin-top:6px; }

        .stock-controls { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }

        .qty-input {
            width:90px; padding:10px 14px;
            background:rgba(255,255,255,0.04);
            border:1px solid rgba(0,255,136,0.3); border-radius:8px;
            color:var(--green); font-family:'Ubuntu Mono',monospace; font-size:18px;
            text-align:center; outline:none;
            transition:border-color .2s;
        }
        .qty-input:focus { border-color:var(--green); }

        .btn {
            padding:10px 22px; border:none; border-radius:8px;
            font-family:'Orbitron',sans-serif; font-weight:700; font-size:11px; letter-spacing:1px;
            cursor:pointer; transition:transform .2s, box-shadow .2s, opacity .2s;
            white-space:nowrap;
        }
        .btn:hover:not(:disabled) { transform:translateY(-1px); }
        .btn:disabled { opacity:.4; cursor:not-allowed; transform:none; }

        .btn-green  { background:linear-gradient(135deg,var(--green),#00cc66); color:#000; box-shadow:0 4px 16px rgba(0,255,136,0.2); }
        .btn-green:hover:not(:disabled) { box-shadow:0 6px 22px rgba(0,255,136,0.4); }

        .btn-cyan   { background:linear-gradient(135deg,var(--cyan),#0088cc); color:#000; box-shadow:0 4px 16px rgba(0,255,255,0.2); }
        .btn-cyan:hover:not(:disabled) { box-shadow:0 6px 22px rgba(0,255,255,0.4); }

        .btn-red    { background:rgba(255,51,51,0.1); color:var(--red); border:1px solid rgba(255,51,51,0.3); }
        .btn-red:hover:not(:disabled) { background:rgba(255,51,51,0.18); }

        .toast {
            position:fixed; bottom:28px; right:28px;
            background:var(--dark); border:1px solid var(--green);
            border-radius:10px; padding:14px 22px;
            font-family:'Ubuntu Mono',monospace; font-size:12px; color:var(--green);
            box-shadow:0 8px 30px rgba(0,0,0,0.5);
            opacity:0; transform:translateY(10px);
            transition:all .3s; pointer-events:none; z-index:9999;
        }
        .toast.show { opacity:1; transform:translateY(0); }
        .toast.err  { border-color:var(--red); color:var(--red); }

        /* Tabs */
        .tabs { display:flex; gap:8px; padding:20px 28px 0; }
        .tab-btn {
            font-family:'Ubuntu Mono',monospace; font-size:11px; letter-spacing:2px;
            padding:8px 18px; background:none;
            border:1px solid var(--border); border-bottom:none;
            border-radius:8px 8px 0 0;
            color:var(--dim); cursor:pointer; transition:all .2s;
        }
        .tab-btn.active { background:var(--medium); color:var(--cyan); border-color:rgba(0,255,255,0.2); }
        .tab-btn:hover:not(.active) { color:var(--muted); }

        .tab-panel { display:none; }
        .tab-panel.active { display:block; }

        /* Tabela de pedidos */
        .table-wrap { overflow-x:auto; }

        table { width:100%; border-collapse:collapse; font-family:'Ubuntu Mono',monospace; font-size:12px; }
        th { padding:10px 14px; text-align:left; color:var(--dim); letter-spacing:1px; border-bottom:1px solid var(--border); font-weight:400; }
        td { padding:12px 14px; border-bottom:1px solid rgba(255,255,255,0.04); vertical-align:middle; }
        tr:hover td { background:rgba(255,255,255,0.02); }

        .status-badge {
            display:inline-block; padding:3px 10px; border-radius:20px; font-size:10px; letter-spacing:1px;
        }
        .status-pendente { background:rgba(255,136,0,0.1);  color:var(--orange); border:1px solid rgba(255,136,0,0.3); }
        .status-pago     { background:rgba(0,255,136,0.1);  color:var(--green);  border:1px solid rgba(0,255,136,0.3); }
        .status-enviado  { background:rgba(0,255,255,0.1);  color:var(--cyan);   border:1px solid rgba(0,255,255,0.3); }
        .status-cancelado{ background:rgba(255,51,51,0.1);  color:var(--red);    border:1px solid rgba(255,51,51,0.3); }

        .rastreio-row { display:flex; gap:8px; align-items:center; min-width:220px; }
        .rastreio-input {
            flex:1; padding:7px 10px;
            background:rgba(255,255,255,0.04);
            border:1px solid var(--border); border-radius:6px;
            color:var(--text); font-family:'Ubuntu Mono',monospace; font-size:11px;
            outline:none; transition:border-color .2s;
        }
        .rastreio-input:focus { border-color:var(--cyan); }
        .rastreio-input:disabled { opacity:.5; cursor:not-allowed; }

        .rastreio-sent {
            font-family:'Ubuntu Mono',monospace; font-size:11px;
            color:var(--cyan); letter-spacing:1px;
        }

        .empty-state {
            text-align:center; padding:48px 24px;
            font-family:'Ubuntu Mono',monospace; font-size:13px; color:var(--dim);
        }

        /* Search */
        .search-bar {
            padding:0 28px 16px;
        }
        .search-input {
            width:100%; padding:10px 16px;
            background:rgba(255,255,255,0.04);
            border:1px solid var(--border); border-radius:8px;
            color:var(--text); font-family:'Ubuntu Mono',monospace; font-size:13px;
            outline:none; transition:border-color .2s;
        }
        .search-input:focus { border-color:var(--cyan); }

        /* Waitlist */
        .waitlist-grid {
            display:flex; flex-wrap:wrap; gap:10px;
        }
        .email-chip {
            background:rgba(153,69,255,0.1); border:1px solid rgba(153,69,255,0.25);
            border-radius:20px; padding:5px 14px;
            font-family:'Ubuntu Mono',monospace; font-size:12px; color:var(--purple);
        }

        @media(max-width:768px) {
            .main { padding:16px; }
            .card-body, .card-header { padding:16px 18px; }
            .login-box { padding:32px 24px; }
        }
    </style>
</head>
<body>

<!-- ════ TELA DE LOGIN ════ -->
<div id="loginScreen">
    <div class="login-box">
        <div class="login-logo">FORTSEC</div>
        <div class="login-sub">PAINEL ADMINISTRATIVO</div>

        <label class="login-label">TOKEN DE ACESSO</label>
        <input type="password" id="tokenInput" class="login-input"
               placeholder="••••••••" autocomplete="off"
               onkeydown="if(event.key==='Enter')login()">

        <label class="login-label" style="margin-top:4px" id="captchaLabel">VERIFICAÇÃO</label>
        <input type="text" id="captchaInput" class="login-input"
               placeholder="?" autocomplete="off" inputmode="numeric"
               onkeydown="if(event.key==='Enter')login()">

        <button class="login-btn" id="loginBtn" onclick="login()">ENTRAR</button>

        <div class="login-err" id="loginErr"></div>
        <div id="lockMsg" style="display:none;font-family:Ubuntu Mono,monospace;font-size:11px;color:var(--red);margin-top:14px"></div>
    </div>
</div>

<!-- ════ PAINEL ════ -->
<div id="dashboard">

    <div class="topbar">
        <div>
            <div class="topbar-title">CONTINUES ADMIN</div>
            <div class="topbar-sub">FORTSEC OFFENSIVE SECURITY</div>
        </div>
        <button class="logout-btn" onclick="logout()">SAIR</button>
    </div>

    <div class="main">

        <!-- ── ESTOQUE ── -->
        <div class="card">
            <div class="card-header">
                <span class="card-title green">ESTOQUE</span>
                <button class="btn btn-cyan" onclick="carregarDados()" style="font-size:10px;padding:7px 16px">ATUALIZAR</button>
            </div>
            <div class="card-body">
                <div class="stock-display">
                    <div>
                        <div class="stock-number" id="stockNum">—</div>
                        <div class="stock-label">UNIDADES DISPONÍVEIS</div>
                    </div>
                    <div class="stock-controls">
                        <input type="number" id="newQty" class="qty-input" min="0" max="9999" placeholder="0">
                        <button class="btn btn-green" onclick="atualizarEstoque()">SALVAR</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- ── PEDIDOS + WAITLIST ── -->
        <div class="card">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('pedidos')">PEDIDOS</button>
                <button class="tab-btn" onclick="switchTab('waitlist')">LISTA DE ESPERA</button>
            </div>

            <!-- Pedidos -->
            <div class="tab-panel active" id="tab-pedidos">
                <div class="search-bar" style="padding-top:20px">
                    <input type="text" id="searchInput" class="search-input"
                           placeholder="Buscar por nome, e-mail ou CPF..." oninput="filtrarPedidos()">
                </div>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>NOME</th>
                                <th>EMAIL</th>
                                <th>CPF</th>
                                <th>STATUS</th>
                                <th>DATA</th>
                                <th>RASTREIO</th>
                            </tr>
                        </thead>
                        <tbody id="pedidosBody"></tbody>
                    </table>
                    <div class="empty-state" id="pedidosEmpty" style="display:none">Nenhum pedido encontrado.</div>
                </div>
            </div>

            <!-- Waitlist -->
            <div class="tab-panel" id="tab-waitlist">
                <div class="card-body">
                    <div id="waitlistCount" style="font-family:'Ubuntu Mono',monospace;font-size:12px;color:var(--dim);margin-bottom:18px"></div>
                    <div class="waitlist-grid" id="waitlistGrid"></div>
                    <div class="empty-state" id="waitlistEmpty" style="display:none">Nenhum e-mail na lista de espera.</div>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
(function () {
    'use strict';

    let adminToken  = '';
    let allPedidos  = [];

    // ── Captcha matemático ────────────────────────────────
    let captchaAnswer = 0;

    function gerarCaptcha() {
        const a = Math.floor(Math.random() * 20) + 1;
        const b = Math.floor(Math.random() * 20) + 1;
        const ops = [
            { label: `${a} + ${b}`, answer: a + b },
            { label: `${a} × ${b}`, answer: a * b },
            { label: `${Math.max(a,b)} - ${Math.min(a,b)}`, answer: Math.max(a,b) - Math.min(a,b) }
        ];
        const op = ops[Math.floor(Math.random() * ops.length)];
        captchaAnswer = op.answer;
        document.getElementById('captchaLabel').textContent = `VERIFICAÇÃO: QUANTO É ${op.label}?`;
        document.getElementById('captchaInput').value = '';
    }

    // ── Bloqueio por tentativas ───────────────────────────
    const MAX_TENTATIVAS = 5;
    const BLOQUEIO_MS    = 10 * 60 * 1000; // 10 minutos
    const STORAGE_KEY    = '_fs_lock';

    function getBloqueio() {
        try { return JSON.parse(sessionStorage.getItem(STORAGE_KEY) || '{}'); } catch { return {}; }
    }

    function setBloqueio(data) {
        sessionStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function estaBloqueado() {
        const d = getBloqueio();
        if (!d.bloqueadoAte) return false;
        if (Date.now() < d.bloqueadoAte) return true;
        setBloqueio({});
        return false;
    }

    function registrarFalha() {
        const d = getBloqueio();
        const tentativas = (d.tentativas || 0) + 1;
        if (tentativas >= MAX_TENTATIVAS) {
            setBloqueio({ tentativas, bloqueadoAte: Date.now() + BLOQUEIO_MS });
        } else {
            setBloqueio({ tentativas });
        }
        return tentativas;
    }

    function resetarFalhas() { setBloqueio({}); }

    function mostrarErro(msg) {
        const el = document.getElementById('loginErr');
        el.textContent = msg;
        el.classList.add('show');
    }

    function verificarBloqueio() {
        if (!estaBloqueado()) return false;
        const d = getBloqueio();
        const restam = Math.ceil((d.bloqueadoAte - Date.now()) / 60000);
        document.getElementById('lockMsg').style.display = 'block';
        document.getElementById('lockMsg').textContent   = `Acesso bloqueado. Tente novamente em ${restam} minuto(s).`;
        document.getElementById('loginBtn').disabled     = true;
        document.getElementById('tokenInput').disabled   = true;
        document.getElementById('captchaInput').disabled = true;
        return true;
    }

    // ── Login ─────────────────────────────────────────────
    window.login = async function () {
        if (verificarBloqueio()) return;

        const t   = document.getElementById('tokenInput').value.trim();
        const cap = parseInt(document.getElementById('captchaInput').value.trim(), 10);

        document.getElementById('loginErr').classList.remove('show');

        if (!t) { mostrarErro('Digite o token de acesso.'); return; }

        if (isNaN(cap) || cap !== captchaAnswer) {
            registrarFalha();
            gerarCaptcha();
            mostrarErro('Resposta incorreta. Tente novamente.');
            return;
        }

        try {
            const r = await fetch('/api/admin?action=dashboard', {
                headers: { 'Authorization': `Bearer ${t}` }
            });

            if (!r.ok) {
                const tentativas = registrarFalha();
                gerarCaptcha();
                const restam = MAX_TENTATIVAS - tentativas;
                if (restam <= 0) {
                    verificarBloqueio();
                } else {
                    mostrarErro(`Token inválido. ${restam} tentativa(s) restante(s).`);
                }
                return;
            }

            resetarFalhas();
            adminToken = t;
            sessionStorage.setItem('admin_token', t);

            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboard').style.display   = 'block';

            const d = await r.json();
            renderDashboard(d);
        } catch (_) {
            mostrarErro('Erro de conexão. Tente novamente.');
        }
    };

    window.logout = function () {
        adminToken = '';
        sessionStorage.removeItem('admin_token');
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('dashboard').style.display   = 'none';
        document.getElementById('tokenInput').value = '';
        gerarCaptcha();
    };

    // Revalidar sessão ao carregar
    window.addEventListener('DOMContentLoaded', async () => {
        gerarCaptcha();
        if (verificarBloqueio()) return;
        const saved = sessionStorage.getItem('admin_token');
        if (!saved) return;
        document.getElementById('tokenInput').value = saved;
        await window.login();
    });

    // ── Carregar / Render ─────────────────────────────────
    window.carregarDados = async function () {
        if (!adminToken) return;
        const r = await fetch('/api/admin?action=dashboard', {
            headers: { 'Authorization': `Bearer ${adminToken}` }
        });
        if (!r.ok) return;
        renderDashboard(await r.json());
        toast('Dados atualizados');
    };

    function renderDashboard(d) {
        // Estoque
        const qtd = d.estoque ?? 0;
        const el  = document.getElementById('stockNum');
        el.textContent = qtd;
        el.className   = `stock-number ${qtd === 0 ? 'out' : qtd <= 3 ? 'low' : 'ok'}`;
        document.getElementById('newQty').value = qtd;

        // Pedidos
        allPedidos = d.pedidos || [];
        renderPedidos(allPedidos);

        // Waitlist
        const wl = d.waitlist || [];
        document.getElementById('waitlistCount').textContent = `${wl.length} e-mail(s) na lista`;
        const grid  = document.getElementById('waitlistGrid');
        const empty = document.getElementById('waitlistEmpty');
        grid.innerHTML = '';
        if (wl.length === 0) { empty.style.display = 'block'; }
        else {
            empty.style.display = 'none';
            wl.forEach(r => {
                const chip = document.createElement('div');
                chip.className   = 'email-chip';
                chip.textContent = r.email;
                grid.appendChild(chip);
            });
        }
    }

    function renderPedidos(lista) {
        const tbody = document.getElementById('pedidosBody');
        const empty = document.getElementById('pedidosEmpty');
        tbody.innerHTML = '';

        if (!lista.length) { empty.style.display = 'block'; return; }
        empty.style.display = 'none';

        lista.forEach(p => {
            const data = p.criado_em ? new Date(p.criado_em).toLocaleDateString('pt-BR') : '—';
            const cpfFmt = p.cpf ? p.cpf.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4') : '—';
            const jaEnviado = p.status === 'enviado' && p.rastreio;

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${esc(p.nome || '—')}</td>
                <td>${esc(p.email || '—')}</td>
                <td style="font-family:'Ubuntu Mono',monospace">${cpfFmt}</td>
                <td><span class="status-badge status-${p.status || 'pendente'}">${(p.status || 'pendente').toUpperCase()}</span></td>
                <td style="font-family:'Ubuntu Mono',monospace;color:var(--dim)">${data}</td>
                <td>
                    ${jaEnviado
                        ? `<span class="rastreio-sent">${esc(p.rastreio)}</span>`
                        : p.status === 'pago'
                            ? `<div class="rastreio-row">
                                 <input type="text" class="rastreio-input" id="r-${esc(p.mp_payment_id)}" placeholder="BR123456789BR" maxlength="30">
                                 <button class="btn btn-cyan" onclick="enviarRastreio('${esc(p.mp_payment_id)}')" style="font-size:10px;padding:7px 12px">ENVIAR</button>
                               </div>`
                            : '<span style="color:var(--dim);font-family:Ubuntu Mono,monospace;font-size:11px">—</span>'
                    }
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    window.filtrarPedidos = function () {
        const q = document.getElementById('searchInput').value.toLowerCase();
        if (!q) { renderPedidos(allPedidos); return; }
        renderPedidos(allPedidos.filter(p =>
            (p.nome  || '').toLowerCase().includes(q) ||
            (p.email || '').toLowerCase().includes(q) ||
            (p.cpf   || '').includes(q)
        ));
    };

    // ── Atualizar estoque ─────────────────────────────────
    window.atualizarEstoque = async function () {
        const qtd = parseInt(document.getElementById('newQty').value, 10);
        if (isNaN(qtd) || qtd < 0) { toast('Quantidade inválida', true); return; }

        const r = await fetch('/api/admin?action=estoque', {
            method:  'POST',
            headers: { 'Content-Type':'application/json', 'Authorization':`Bearer ${adminToken}` },
            body:    JSON.stringify({ quantidade: qtd })
        });
        const d = await r.json();
        if (!r.ok) { toast(d.erro || 'Erro', true); return; }

        const el = document.getElementById('stockNum');
        el.textContent = qtd;
        el.className   = `stock-number ${qtd === 0 ? 'out' : qtd <= 3 ? 'low' : 'ok'}`;

        let msg = `Estoque atualizado para ${qtd}`;
        if (d.notificados > 0) msg += ` · ${d.notificados} emails notificados`;
        toast(msg);
    };

    // ── Rastreio ──────────────────────────────────────────
    window.enviarRastreio = async function (paymentId) {
        const input  = document.getElementById(`r-${paymentId}`);
        const codigo = (input?.value || '').trim().toUpperCase();
        if (!codigo) { toast('Digite o código de rastreio', true); return; }

        input.disabled = true;

        const r = await fetch('/api/admin?action=rastreio', {
            method:  'POST',
            headers: { 'Content-Type':'application/json', 'Authorization':`Bearer ${adminToken}` },
            body:    JSON.stringify({ payment_id: paymentId, codigo })
        });

        if (!r.ok) { toast('Erro ao enviar rastreio', true); input.disabled = false; return; }

        toast(`Rastreio enviado: ${codigo}`);
        await carregarDados();
    };

    // ── Tabs ──────────────────────────────────────────────
    window.switchTab = function (tab) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        document.querySelector(`[onclick="switchTab('${tab}')"]`).classList.add('active');
        document.getElementById(`tab-${tab}`).classList.add('active');
    };

    // ── Helpers ───────────────────────────────────────────
    function esc(str) {
        if (typeof str !== 'string') return '';
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    let toastTimer;
    function toast(msg, err = false) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.className   = `toast show ${err ? 'err' : ''}`;
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => { el.classList.remove('show'); }, 3500);
    }

    // Enter no login
    document.getElementById('tokenInput')?.addEventListener('keydown', e => {
        if (e.key === 'Enter') window.login();
    });

})();
</script>
</body>
</html>
